providers:
  kubernetesGateway:
    enabled: true
    experimentalChannel: true
  
  kubernetesIngress:
    enabled: false


# https://github.com/traefik/traefik-helm-chart/blob/master/traefik/VALUES.md
# Immich large uploads require timeouts to 600s
# ports.websecure.transport.respondingTimeouts.readTimeout
# ports.websecure.transport.respondingTimeouts.writeTimeout
ports:
  web:
    port: 80
  websecure:
    port: 443
    transport:
      respondingTimeouts:
        writeTimeout: 1200s
        readTimeout: 1200s

  # https://github.com/traefik/traefik-helm-chart/blob/master/EXAMPLES.md#deploy-multiple-gateways-with-a-single-traefik-deploymentdaemonset
  minecraft:
    port: 25565
    protocol: TCP
    exposedPort: 25565
    expose:
      external: true

gateway:
  enabled: false

gatewayClass:
  enabled: true
  name: traefik

# Optional: Enable logs and metrics
logs:
  general:
    level: INFO

  access:
    enabled: true
    format: json  # or "common" for CLF format
    # filters:
    #   statusCodes:
    #     - "200"
    #     - "400-404"
    #     - "500-503"
    fields:
      general:
        defaultMode: keep
        # names:
        #   ClientUsername: drop
      headers:
        defaultMode: keep
        names:
          # User-Agent: redact
          Content-Type: keep

