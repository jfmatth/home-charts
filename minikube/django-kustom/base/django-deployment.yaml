apiVersion: apps/v1
kind: Deployment
metadata:
  name: django-app
spec:
  template:
    spec:
      containers:
      - name: django
        image: my-django-app:latest
        env:
        # Django uses the CNPG-generated secret for credentials
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: django-db-app
              key: uri
